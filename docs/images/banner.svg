<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#grid)"/>
  <!-- Browser with download arrow icon -->
  <g transform="translate(100, 100)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2">
    <!-- Browser window -->
    <rect x="-38" y="-35" width="50" height="40" rx="3" fill="rgba(255,255,255,0.1)"/>
    <!-- Browser title bar -->
    <line x1="-38" y1="-25" x2="12" y2="-25"/>
    <circle cx="-32" cy="-30" r="2" fill="rgba(255,255,255,0.4)"/>
    <circle cx="-25" cy="-30" r="2" fill="rgba(255,255,255,0.4)"/>
    <circle cx="-18" cy="-30" r="2" fill="rgba(255,255,255,0.4)"/>
    <!-- Content lines -->
    <line x1="-32" y1="-18" x2="6" y2="-18" stroke="rgba(255,255,255,0.3)"/>
    <line x1="-32" y1="-12" x2="-5" y2="-12" stroke="rgba(255,255,255,0.3)"/>
    <!-- Download arrow -->
    <line x1="20" y1="5" x2="20" y2="35" stroke-width="2.5"/>
    <polyline points="10,25 20,37 30,25" stroke-width="2.5" fill="none"/>
    <!-- Base tray -->
    <path d="M 5,40 L 5,35 L 35,35 L 35,40" stroke-width="2"/>
  </g>
  <!-- Title -->
  <text x="480" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">media-download</text>
  <!-- Subtitle -->
  <text x="480" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Download all media files from any web page</text>
</svg>